<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 4</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1> Sign Up Form </h1><br>

    <fieldset id="fieldset">
        <legend id="legend">Sign Up</legend>
        First Name: <input type="text"><br>
        Last Name: <input type="text"><br>
        Email: <input type="text"><br>
        Phone Number:<input type="text"><br><br>
        Zip Code: <input type="text" id="zipcode"><br>
        City: <span id="city"></span>
        <br>
        Latitude: <span id="latitude"></span>
        <br>
        Longitude: <span id="longitude"></span>
        <br><br>
        State: <select></select><br>
        Select a County: <select></select><br>

        Desired Username: <input type="text" id="username"><br>
        Password: <input type="password" id="password"><br>
        Suggested Password: <span id="suggestedPassword"></span><br>
        Type Password Again: <input id="confirmPassword" type="password"><br>
        <input id="submit" type="submit" value="Sign up!">
    </fieldset>

    <script src="script.js" defer></script>
</body>

</html>
